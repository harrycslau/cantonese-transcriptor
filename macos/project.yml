name: Transcriptor
options:
  bundleIdPrefix: com.cantonese
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_NAME: Transcriptor
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    ARCHS: arm64

targets:
  Transcriptor:
    type: application
    platform: macOS
    sources:
      - path: Transcriptor
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cantonese.Transcriptor
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Transcriptor needs microphone access to record audio for transcription."
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: Transcriptor
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    entitlements:
      path: Transcriptor/Transcriptor.entitlements
      properties:
        com.apple.security.app-sandbox: false

schemes:
  Transcriptor:
    build:
      targets:
        Transcriptor: all
    run:
      config: Debug
      environmentVariables:
        TRANSCRIPTOR_HELPER_PATH: /Users/harrycslau/Documents/GitRepositories/cantonese-transcriptor/helper/server.py
        TRANSCRIPTOR_PYTHON: /Users/harrycslau/miniconda3/bin/python3
        PYANNOTE_PYTHON: /Users/harrycslau/miniconda3/envs/pyannote-bench/bin/python
